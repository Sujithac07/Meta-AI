version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: automl_postgres
    environment:
      POSTGRES_USER: automl_user
      POSTGRES_PASSWORD: automl_password
      POSTGRES_DB: automl_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automl_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: automl_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: automl_backend
    environment:
      DATABASE_URL: postgresql://automl_user:automl_password@postgres:5432/automl_platform
      REDIS_URL: redis://redis:6379
      API_HOST: 0.0.0.0
      API_PORT: 8000
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./ml_core:/app/ml_core
      - ./data:/app/data
    command: >
      sh -c "pip install -r requirements.txt &&
             python -m uvicorn backend_api_main:app 
             --host 0.0.0.0 --port 8000 --reload"

  # React Frontend
  frontend:
    image: node:20-alpine
    container_name: automl_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: >
      sh -c "npm install &&
             npm run dev"
    depends_on:
      - backend

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: automl_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: automl_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployment/monitoring/grafana_dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

  # MLflow Tracking
  mlflow:
    image: python:3.10-slim
    container_name: automl_mlflow
    ports:
      - "5001:5000"
    working_dir: /mlflow
    volumes:
      - ./mlruns:/mlflow/mlruns
    command: >
      sh -c "pip install mlflow &&
             mlflow server --host 0.0.0.0 --port 5000 
             --backend-store-uri sqlite:///mlflow.db"

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  automl_network:
    driver: bridge
