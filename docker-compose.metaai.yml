# Meta AI — Docker Compose
# Gradio UI (7860) + FastAPI (8000) from backend_api_main:app
# Run: docker compose -f docker-compose.metaai.yml up --build

services:
  # Gradio UI Service
  gradio-ui:
    build:
      context: .
      dockerfile: Dockerfile.metaai
    container_name: metaai-gradio
    ports:
      - "7860:7860"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    command: python quick_start.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - metaai-network

  # FastAPI — same app as local: uvicorn backend_api_main:app
  fastapi-server:
    build:
      context: .
      dockerfile: Dockerfile.metaai
    container_name: metaai-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    command:
      - uvicorn
      - backend_api_main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - gradio-ui
    networks:
      - metaai-network

  # Optional: Redis for caching (future use)
  # redis:
  #   image: redis:7-alpine
  #   container_name: metaai-redis
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - metaai-network

networks:
  metaai-network:
    driver: bridge

volumes:
  models:
  data:
  logs:
